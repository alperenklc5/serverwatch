server:
  port: 8090

spring:
  application:
    name: serverwatch
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

serverwatch:
  collector:
    interval-ms: 2000
    history-retention-hours: 24
  docker:
    socket-path: unix:///var/run/docker.sock
  alert:
    cooldown-minutes: 5
    evaluation-interval-ms: 5000
  git:
    base-path: /opt/repos
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-production-this-is-dev-only}
    jwt-expiration-ms: 86400000
  filemanager:
    allowed-roots:
      - /home
      - /opt
      - /var/www
      - /etc
      - /tmp
    readonly-roots:
      - /etc
    denied-paths:
      - /etc/shadow
      - /etc/sudoers
      - /root/.ssh
      - /home/*/.ssh
    max-upload-size-mb: 500
    max-editable-size-mb: 10
  terminal:
    shell: /bin/bash
    available-shells:
      - /bin/bash
      - /bin/sh
      - /bin/zsh
    default-cwd: ${user.home}
    env:
      TERM: xterm-256color
      LANG: en_US.UTF-8
    session-timeout-minutes: 30
    max-sessions: 10
    max-buffer-bytes: 1048576

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
